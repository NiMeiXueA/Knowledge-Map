<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联邦学习论文技术路线图</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-index">
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-actions">
        <button id="paper-search-toggle" class="hero-action-btn" type="button" aria-expanded="false" aria-controls="hero-search-panel">论文搜索</button>
        <a class="hero-action-btn hero-network-btn" href="network.html">论文关系网</a>
      </div>
      <div id="hero-search-panel" class="hero-search-panel" hidden>
        <div class="search-controls">
          <label class="search-field" for="paper-search-input">
            <span class="search-label">关键词</span>
            <input id="paper-search-input" type="search" placeholder="例如：fed / prompt / fairness / 2024 / McMahan" autocomplete="off">
          </label>
          <button id="paper-search-clear" class="search-clear" type="button">清空</button>
        </div>
        <p id="search-status" class="search-status" aria-live="polite"></p>
      </div>
      <section class="hero-main">
        <p class="eyebrow">Federated Learning Research Atlas</p>
        <h1>联邦学习论文技术路线图</h1>
        <p class="hero-copy">从基础优化到个性化、蒸馏、图联邦、生成式联邦、提示学习与系统部署，按大类、年份和创新点查看你的论文集合。</p>
        <div class="hero-stats" id="hero-stats"></div>
      </section>
    </div>
  </header>
  <main class="main-shell">
    <section class="legend-card">
      <div>
        <h2>阅读方式</h2>
        <p>每个大类先给出“为什么会出现、优点、缺点”，下面按年份组织为树状时间线。点击卡片可进入论文详情页，查看创新点、主要流程、应用场景与缺陷分析。</p>
      </div>
      <div class="legend-tags">
        <span>年份节点</span>
        <span>创新标签</span>
        <span>论文卡片</span>
        <span>详情页跳转</span>
      </div>
    </section>
    <div id="category-root" class="category-root"></div>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
