name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install root npm deps
        run: npm ci

      - name: Install frontend deps
        run: cd front && npm ci

      - name: Build sidecar (PyInstaller)
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File desktop/backend/build_backend.ps1

      - name: Verify sidecar binary
        shell: powershell
        run: |
          if (-not (Test-Path "src-tauri/binaries/knowledge-map-backend-x86_64-pc-windows-msvc.exe")) {
            throw "sidecar missing: src-tauri/binaries/knowledge-map-backend-x86_64-pc-windows-msvc.exe"
          }
          Write-Host "sidecar OK"

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Knowledge Map v__VERSION__"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --target x86_64-pc-windows-msvc
